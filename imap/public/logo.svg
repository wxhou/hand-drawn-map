<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Seal stamp border with subtle distress -->
  <rect x="3" y="3" width="58" height="58" rx="4" fill="none" stroke="#c4453a" stroke-width="3.5" stroke-linecap="round"/>
  <!-- Inner accent line -->
  <rect x="7" y="7" width="50" height="50" rx="2" fill="none" stroke="#c4453a" stroke-width="0.8" opacity="0.4"/>
  <!-- 墨 character — brush stroke style -->
  <g fill="#c4453a" transform="translate(32,34)">
    <!-- Top-left dot -->
    <ellipse cx="-12" cy="-16" rx="3.5" ry="2.5" transform="rotate(-15)"/>
    <!-- Top horizontal stroke -->
    <path d="M-16,-10 C-10,-11.5 4,-12 16,-10 C16,-8.5 4,-7.5 -10,-8.5 C-14,-8.8 -16,-9 -16,-10Z"/>
    <!-- Left vertical stroke -->
    <path d="M-8,-8 C-8.8,-4 -9.5,4 -10,14 C-9,14.5 -7.5,14.5 -6.5,14 C-6,4 -5.5,-4 -5,-8 C-6,-8.5 -7.5,-8.5 -8,-8Z"/>
    <!-- Center vertical stroke -->
    <path d="M-1,-8 C-1.5,-3 -2,5 -2.5,14 C-1.5,14.5 0,14.5 1,14 C1.2,5 1,-3 1.5,-8 C0.5,-8.5 -0.5,-8.5 -1,-8Z"/>
    <!-- Right vertical stroke -->
    <path d="M7,-8 C6.5,-3 6,5 5.5,14 C6.5,14.5 8,14.5 9,14 C9.2,5 9,-3 9.5,-8 C8.5,-8.5 7.5,-8.5 7,-8Z"/>
    <!-- Bottom horizontal stroke (wider) -->
    <path d="M-16,12 C-10,10.5 4,10 16,12 C16,14 4,14.8 -10,13.8 C-14,13.5 -16,13 -16,12Z"/>
  </g>
</svg>